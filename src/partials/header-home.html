<body>
  <!-- Liquid Glass Header -->
  <header class="header-wrapper">
    <glass-element class="header-glass" fluid height="72" radius="0" depth="8" blur="2" strength="35"
      chromatic-aberration="1" background-color="rgba(255,255,255,0.65)" style="overflow:visible;"
      data-header="true">
      <nav class="navbar" id="navbar">
        <div class="navbar-container">
          <a href="#" class="navbar-logo" aria-label="Caselyn - Inicio">
            <svg width="140" height="40" viewBox="0 0 512 146" xmlns="http://www.w3.org/2000/svg">
              <text x="0" y="110" font-family="-apple-system, BlinkMacSystemFont, SF Pro Display, Inter, sans-serif"
                font-size="100" font-weight="600" fill="#0A0A0A" letter-spacing="-2">
                CASELYN
              </text>
            </svg>
          </a>

          <button class="navbar-toggle" id="navbar-toggle" aria-label="Abrir menú">
            <span></span>
            <span></span>
            <span></span>
          </button>

          <ul class="navbar-menu" id="navbar-menu">
            <li><a href="#servicios" data-i18n="nav.servicios">Servicios</a></li>
            <li><a href="#ejemplos" data-i18n="nav.portafolio">Ejemplos</a></li>
            <li><a href="#proceso" data-i18n="nav.proceso">Proceso</a></li>
            <li><a href="#faq" data-i18n="nav.faq">FAQ</a></li>
            <!-- Language Selector — items rendered by JS from config -->
            <li class="lang-selector-wrapper" id="lang-selector">
              <button class="lang-trigger" id="lang-trigger" aria-expanded="false" aria-haspopup="true"
                aria-label="Select language">
                <span class="lang-trigger-label" id="lang-trigger-label">ES</span>
                <svg class="lang-trigger-chevron" width="10" height="6" viewBox="0 0 10 6" fill="none"
                  aria-hidden="true">
                  <path d="M1 1L5 5L9 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                    stroke-linejoin="round" />
                </svg>
              </button>
              <div class="lang-dropdown" id="lang-dropdown" aria-label="Language options">
                <!-- Populated dynamically by script.js -->
              </div>
            </li>
            <li><a href="/contacto" class="btn btn-liquid-glass" data-i18n="nav.contacto">Contactar</a></li>
          </ul>
        </div>
      </nav>
    </glass-element>
  </header>
